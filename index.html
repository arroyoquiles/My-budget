  if(freq==="semimonthly")return[new Date(yr,mth,1),new Date(yr,mth,15)];
  if(freq==="monthly"){
    const base=parseAnchor(anchor);
    const last=new Date(yr,mth+1,0).getDate();
    return[new Date(yr,mth,Math.min(base.getDate(),last))];
  }

  for(let i=startN;i<=startN+8;i++){
    const pd=new Date(base.getTime()+i*step*86400000);

  }
  return days;
};

const getUpcomingPaydays=(anchor,count=8,freq="biweekly")=>{

      const d15=new Date(d.getFullYear(),d.getMonth(),15);
      if(d1>=today)days.push(new Date(d1));

  }
  if(freq==="monthly"){

    if(d<today)d=new Date(d.getFullYear(),d.getMonth()+1,base.getDate());
    while(days.length<count){days.push(new Date(d));d=new Date(d.getFullYear(),d.getMonth()+1,d.getDate());}

  }

const getSnapshotReminder=(today,snapshots)=>{
  const d=today.getDate();
  const dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const prevMonthName=mo[today.getMonth()===0?11:today.getMonth()-1];
  const hasThisMonth=(snapshots||[]).some(s=>s.fecha&&s.fecha.includes(mo[today.getMonth()])&&s.fecha.includes(String(today.getFullYear())));
  const hasPrevMonth=(snapshots||[]).some(s=>{
    if(!s.fecha)return false;
    const prevY=today.getMonth()===0?today.getFullYear()-1:today.getFullYear();
    return s.fecha.includes(prevMonthName)&&s.fecha.includes(String(prevY));
  });
  if(d>=dim-2){if(!hasThisMonth)return{type:"warn",msg:"Save Monthly Snapshot before exporting backup"};else return{type:"info",msg:"Backup recommended"};}
  if(d<=3){if(!hasPrevMonth)return{type:"warn",msg:`Last month snapshot missing`};else return{type:"info",msg:"Export monthly backup recommended"};}
  return null;
};

              const isCur=p.isCurrent;
              return(<button key={p.id} style={{...BTN,flex:1,padding:"8px 6px",fontSize:11,borderRadius:9,

                color:isActive?T.accent:T.muted,
                border:isActive?(isCur?`2px solid ${T.accent}`:`1px solid ${T.accent}`):(isCur?`1px solid ${T.accent}59`:"1px solid transparent"),

                <span style={{fontWeight:isActive?700:500}}>{p.label}</span>
                {p.statusLabel&&<span style={{fontSize:8,fontWeight:700,letterSpacing:0.5,color:isActive?T.accent:p.statusLabel==="Current"?"#3fb950":p.statusLabel==="Cleared"?"#a78bfa":"#d29922",lineHeight:1}}>{p.statusLabel.toUpperCase()}<span style={{fontWeight:400,letterSpacing:0,color:T.muted,marginLeft:3}}>· {pusedPct}%</span></span>}
              </button>);

          {data.proximoCobro&&(()=>{

          })()}
        </div>)}
        {tab==="debts"&&(()=>{
          const cards=allDebts.filter(d=>d.tipo==="card");
          const loans=allDebts.filter(d=>d.tipo==="loan");
          const priorityDebts=allDebts.filter(d=>d.priority);
          const totalCards=data.tarjetas.reduce((s,t)=>s+n(t.balance),0);
          const totalLoans=(data.loans||[]).reduce((s,l)=>s+n(l.balance),0);
          const totalPriority=priorityDebts.reduce((s,d)=>s+n(d.balance),0);
          // Sorted debts — starred cards always appear first within credit cards section
          const sortCards=(arr)=>{
            // Don't re-sort while a card is being edited (prevents jumping)
            if(expandedCardId||expandedLoanId) return [...arr].sort((a,b)=>(b.priority?1:0)-(a.priority?1:0));
            if(sortStrategy==="apr")     return [...arr].sort((a,b)=>(b.priority?1:0)-(a.priority?1:0)||n(b.interes)-n(a.interes));
            if(sortStrategy==="balance") return [...arr].sort((a,b)=>(b.priority?1:0)-(a.priority?1:0)||n(a.balance)-n(b.balance));
            return [...arr].sort((a,b)=>(b.priority?1:0)-(a.priority?1:0));
          };
          const sortedAllDebts=(expandedCardId||expandedLoanId)?allDebts:sortStrategy==="apr"
            ?[...allDebts].sort((a,b)=>n(b.interes)-n(a.interes))
            :sortStrategy==="balance"
            ?[...allDebts].sort((a,b)=>n(a.balance)-n(b.balance))
            :allDebts;
          const firstDebtId=sortStrategy?sortedAllDebts.find(d=>n(d.balance)>0)?.id??null:null;
          const freshCards=sortCards(debtsFilter==="all"||debtsFilter==="cards"?cards:debtsFilter==="loans"?[]:cards);
          const freshLoans=(debtsFilter==="all"||debtsFilter==="loans"?loans:debtsFilter==="cards"?[]:loans).sort((a,b)=>(b.priority?1:0)-(a.priority?1:0));
          if(!expandedCardId&&!expandedLoanId){cardOrderRef.current=freshCards.map(c=>c.id);loanOrderRef.current=freshLoans.map(l=>l.id);}
          const visibleCards=expandedCardId&&cardOrderRef.current.length?[...freshCards].sort((a,b)=>cardOrderRef.current.indexOf(a.id)-cardOrderRef.current.indexOf(b.id)):freshCards;
          const visibleLoans=expandedLoanId&&loanOrderRef.current.length?[...freshLoans].sort((a,b)=>loanOrderRef.current.indexOf(a.id)-loanOrderRef.current.indexOf(b.id)):freshLoans;
          const filterBtns=[{id:"all",label:"All"},{id:"cards",label:"💳 Cards"},{id:"loans",label:"🏦 Loans"}];
          const sortLabels={apr:"APR",balance:"SMALL"};
          const hasExpanded=!!(expandedCardId||expandedLoanId);
          const closeExpanded=()=>{
            if(expandedCardId){bumpReset(expandedCardId);setExpandedCardId(null);}
            if(expandedLoanId){bumpReset(expandedLoanId);setExpandedLoanId(null);}
            setAccion(null);setMontoAccion("");
          };
          return(<div className="anim">

            {/* Filter selector */}
            <div style={{display:"flex",gap:5,marginBottom:12,background:T.surface2,borderRadius:11,padding:3}}>
              {filterBtns.map(f=>(<button key={f.id} style={{...BTN,flex:1,padding:"7px 4px",fontSize:11,borderRadius:9,background:debtsFilter===f.id?T.bg:"transparent",color:debtsFilter===f.id?T.accent:T.muted,border:debtsFilter===f.id?`1px solid ${T.accent}`:"1px solid transparent",transition:"all 0.15s"}} onClick={()=>{setDebtsFilter(f.id);setSortMenuOpen(false);if(expandedCardId){bumpReset(expandedCardId);setExpandedCardId(null);}if(expandedLoanId){bumpReset(expandedLoanId);setExpandedLoanId(null);}setAccion(null);setMontoAccion("");}}>{f.label}</button>))}
            </div>
            {/* Compact dynamic totals */}
            <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              {(debtsFilter==="all"||debtsFilter==="cards")&&totalCards>0&&(<div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:9,background:T.surface2,border:`1px solid ${T.border}`}}>
                <span style={{fontSize:10,color:T.muted}}>💳 Cards</span>
                <span style={{fontFamily:"monospace",fontWeight:700,color:"#94a3b8",fontSize:12}}>{fmt(totalCards)}</span>
              </div>)}
              {(debtsFilter==="all"||debtsFilter==="loans")&&totalLoans>0&&(<div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:9,background:T.surface2,border:`1px solid ${T.border}`}}>
                <span style={{fontSize:10,color:T.muted}}>🏦 Loans</span>
                <span style={{fontFamily:"monospace",fontWeight:700,color:"#94a3b8",fontSize:12}}>{fmt(totalLoans)}</span>
              </div>)}
              {debtsFilter==="all"&&(<div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:9,background:T.surface2,border:`1px solid ${T.border}`}}>
                <span style={{fontSize:10,color:T.muted}}>Total</span>
                <span style={{fontFamily:"monospace",fontWeight:700,color:"#94a3b8",fontSize:12}}>{fmt(totalDebt)}</span>
              </div>)}
              {/* Sort strategy toggle */}
              <div style={{marginLeft:"auto",position:"relative"}}>
                {sortMenuOpen&&<div style={{position:"fixed",inset:0,zIndex:99998}} onClick={()=>setSortMenuOpen(false)}/>}
                <div style={{position:"relative"}}>
                <button ref={sortBtnRef} style={{...BTN,width:52,height:26,padding:0,borderRadius:8,background:sortStrategy?`${T.accent}1f`:"transparent",color:sortStrategy?T.accent:T.muted,border:`1px solid ${sortStrategy?T.accent:T.border}`,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} onClick={()=>setSortMenuOpen(o=>!o)}>
                  {sortStrategy?<span>{sortLabels[sortStrategy]}</span>:<span style={{fontSize:11}}>⇅</span>}
                </button>
                {sortMenuOpen&&<div style={{position:"absolute",right:0,top:"100%",marginTop:4,zIndex:99999,background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden",width:80,boxShadow:`0 4px 16px rgba(0,0,0,0.5)`}}>
                    {[{v:null,l:"Off"},{v:"apr",l:"APR"},{v:"balance",l:"Small"}].map(({v,l})=>(
                      <button key={l} style={{...BTN,width:"100%",padding:"8px 12px",fontSize:12,borderRadius:0,background:sortStrategy===v?`${T.accent}18`:"transparent",color:sortStrategy===v?T.accent:T.muted,borderBottom:`1px solid ${T.border}`,fontWeight:sortStrategy===v?700:400,textAlign:"left"}} onClick={()=>{setSortStrategy(v);setSortMenuOpen(false);}}>{l}</button>
                    ))}
                  </div>}
                </div>
              </div>
            </div>
            {(debtsFilter==="all"||debtsFilter==="cards")&&(<>
              {/* Credit Cards section header - only when cards exist */}
              {visibleCards.length>0&&<div style={{display:"flex",alignItems:"center",gap:0,marginBottom:cardsCollapsed?8:10,marginTop:4,filter:expandedLoanId?"blur(1.5px) brightness(0.6)":"none",transition:"filter 0.2s ease"}}>
                <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${T.border})`}}/>
                <button style={{...BTN,display:"flex",alignItems:"center",gap:6,padding:"5px 12px",borderRadius:20,background:T.surface2,border:`1px solid ${T.border}`}} onClick={()=>{setCardsCollapsed(c=>!c);setExpandedCardId(prev=>{if(prev){bumpReset(prev);}return null;});setAccion(null);setMontoAccion("");setSortMenuOpen(false);}}>
                  <span style={{fontSize:13}}>{cardsCollapsed?"▶":"▼"}</span>
                  <span style={{fontSize:11,fontWeight:700,color:"#94a3b8",letterSpacing:0.5}}>💳 Credit Cards</span>
                  <span style={{fontSize:10,color:T.muted,fontWeight:500}}>{visibleCards.length} card{visibleCards.length!==1?"s":""} · {fmt(visibleCards.reduce((s,d)=>s+n(d.balance),0))}</span>
                </button>
                {!cardsCollapsed&&(
                  <button
                    style={{...BTN,marginLeft:6,padding:"3px 9px",fontSize:14,fontWeight:600,color:T.muted,background:"transparent",border:`1px solid ${T.border}`,borderRadius:16,lineHeight:1.2,flexShrink:0}}
                    onClick={(e)=>{e.stopPropagation();addCard();}}
                  >+</button>
                )}
                <div style={{flex:1,height:1,background:`linear-gradient(90deg,${T.border},transparent)`}}/>
              </div>}
              {visibleCards.length===0&&(
                <div className="anim" style={{textAlign:"center",padding:"28px 20px",marginBottom:12,...CARD}}>
                    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" style={{margin:"0 auto 10px",display:"block",opacity:0.3}}>
                      <rect x="3" y="10" width="38" height="24" rx="5" stroke={T.muted} strokeWidth="2" fill="none"/>
                      <line x1="3" y1="18" x2="41" y2="18" stroke={T.muted} strokeWidth="2"/>
                      <rect x="8" y="22" width="10" height="6" rx="2" stroke={T.muted} strokeWidth="1.5" fill="none"/>
                      <line x1="24" y1="24" x2="36" y2="24" stroke={T.muted} strokeWidth="1.5" strokeLinecap="round"/>
                      <line x1="24" y1="27" x2="32" y2="27" stroke={T.muted} strokeWidth="1.5" strokeLinecap="round"/>
                    </svg>
                    <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:3}}>No credit cards</div>
                    <div style={{fontSize:11,color:T.muted,marginBottom:12}}>Track your balances, APR<br/>and payment due dates</div>
                    <button style={{...BTN,padding:"8px 20px",background:`${T.accent}14`,color:T.accent,fontSize:12,fontWeight:600,border:`1px solid ${T.accent}33`,borderRadius:9}} onClick={addCard}>+ Add Card</button>
                </div>
              )}
              {!cardsCollapsed&&visibleCards.length>0&&(()=>{
                const HEADER_H = 58;
                const OVERLAP  = 18;
                const GAP      = 10;
                const expandedIdx = visibleCards.findIndex(c => c.id === expandedCardId);

                return(
                  <div style={{marginBottom:16,filter:expandedLoanId?"blur(1.5px) brightness(0.6)":"none",transition:"filter 0.2s ease"}}>
                    {visibleCards.map((d, stackIdx)=>{
                      const globalIdx=allDebts.findIndex(x=>x.id===d.id&&x.tipo===d.tipo);
                      const isPriorityFirst=!!sortStrategy&&d.id===firstDebtId;
                      const isNewDraft = d.id===newCardDraftId;
                      const isAdding_ = isNewDraft && !!addingDebt && addingDebt.id===d.id;
                      const isExpanded = expandedCardId===d.id;
                      const isFirstAfterExpanded = expandedIdx >= 0 && stackIdx === expandedIdx + 1;

                      // Expanded card floats above everything. All others: card 1 on top (highest z).
                      const zIndex = isExpanded
                        ? visibleCards.length + 10
                        : Math.max(1, visibleCards.length - stackIdx);

                      // Expanded card gets a gap above AND below (it floats between two stacks)
                      const marginTop = stackIdx === 0
                        ? 0
                        : isExpanded
                          ? GAP
                          : isFirstAfterExpanded
                            ? GAP
                            : -OVERLAP;

                      // Opacity: non-focused cards dim when any card is expanded
                      const opacity = 1;
                      const transition = "filter 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease";
                      const filter = (expandedIdx >= 0 && !isExpanded) ? "blur(1.5px) brightness(0.6)" : "none";
                      const transform = isExpanded ? "scale(1.02)" : "none";

                      const handleExpand=(e)=>{
                        if(e&&e.stopPropagation)e.stopPropagation();
                        if(expandedLoanId) return; // block if a loan is expanded
                        setSortMenuOpen(false);
                        if(isExpanded){
                          if(!isNewDraft) bumpReset(d.id);
                          setExpandedCardId(null);
                          setAccion(null);setMontoAccion("");
                          if(isNewDraft) setAddingDebt(null);
                        } else {
                          setExpandedCardId(prev=>{
                            if(prev && prev!==d.id){
                              bumpReset(prev);
                              if(prev===newCardDraftId) setAddingDebt(null);
                            }
                            return d.id;
                          });
                          setAccion(null);setMontoAccion("");
                          if(isNewDraft && (!addingDebt || addingDebt.id!==d.id)){
                            setAddingDebt({id:d.id,tipo:"card"});
                          }
                          setTimeout(()=>{const el=document.getElementById(`debt-${d.id}`);if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},80);
                        }
                      };

                      const clipH = isExpanded ? null : HEADER_H;

                      return(
                        <div
                          key={d.id}
                          id={`debt-${d.id}`}
                          ref={isNewDraft ? newCardRef : null}
                          style={{position:"relative",marginTop,zIndex,isolation:"isolate",opacity,transition,filter,transform,
                            ...(isExpanded?{boxShadow:"0 8px 32px rgba(0,0,0,0.7)",borderRadius:14}:{})
                          }}
                          onTouchStart={isExpanded?e=>{
                            if(e.target.closest('button,input,select,textarea'))return;
                            e.currentTarget._swipeY=e.touches[0].clientY;
                          }:undefined}
                          onTouchEnd={isExpanded?e=>{
                            if(e.currentTarget._swipeY==null)return;
                            const dy=e.changedTouches[0].clientY-(e.currentTarget._swipeY||0);
                            e.currentTarget._swipeY=null;
                            if(dy>60){haptic(20);handleExpand(e);}
                          }:undefined}
                        >
                          <div
                            style={{
                              borderRadius:14,
                              overflow:isExpanded?"visible":"hidden",
                              cursor:isExpanded?"default":"pointer",
                              userSelect:"none",
                              WebkitUserSelect:"none",
                              WebkitTouchCallout:"none",
                              position:"relative",
                              ...(clipH!=null?{height:clipH,maxHeight:clipH}:{}),
                            }}
                            onClick={!isExpanded ? handleExpand : undefined}
                            onContextMenu={e=>e.preventDefault()}
                          >
                            {!isExpanded&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:3,borderRadius:"14px 0 0 14px",background:d._vc?.color||CC[d.nombre]?.color||"#ec4899",opacity:0.7,zIndex:1}}/>}
                            {isExpanded&&<div style={{position:"absolute",top:-48,left:"50%",transform:"translateX(-50%)",zIndex:20,pointerEvents:"all"}}>
                              <button style={{...BTN,padding:"7px 18px",borderRadius:999,background:T.surface,border:`1px solid ${T.accent}`,color:T.accent,fontSize:12,fontWeight:700,boxShadow:"0 4px 16px rgba(0,0,0,0.5)",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}
                                onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();handleExpand(e);}}>
                                ✕  Close
                              </button>
                            </div>}
                            <DebtCard
                              debt={d}
                              idx={globalIdx}
                              isFirst={isPriorityFirst}
                              tipo="card"
                              accion={isExpanded?accion:null}
                              setAccion={isExpanded?setAccion:()=>{}}
                              montoAccion={isExpanded?montoAccion:""}
                              setMontoAccion={isExpanded?setMontoAccion:()=>{}}
                              onApply={isExpanded?applyAccion:()=>{}}
                              onUpdate={updateTarjeta}
                              onRemove={(id)=>{
                                const el=document.getElementById(`debt-${id}`);
                                if(el){el.classList.add("debt-exit");setTimeout(()=>{removeTarjeta(id);setExpandedCardId(null);if(id===newCardDraftId){setNewCardDraftId(null);setAddingDebt(null);}},280);}
                                else{removeTarjeta(id);setExpandedCardId(null);if(id===newCardDraftId){setNewCardDraftId(null);setAddingDebt(null);}}
                              }}
                              isAdding={isAdding_}
                              setAddingDebt={(v)=>{
                                setAddingDebt(v);
                                if(!v){
                                  setNewCardDraftId(null);
                                  setExpandedCardId(null);
                                }
                              }}
                              onTogglePriority={togglePriorityCard}
                              onCollapse={isExpanded?handleExpand:null}
                              resetToken={resetTokens[d.id]}
                              clipH={clipH}
                              T={T}
                            />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );

                  <div style={{marginBottom:10,padding:"8px 10px",background:T.surface2,borderRadius:9,fontSize:11,color:T.muted}}>✏️ Variable — set the amount per paycheck in the <strong style={{color:T.accent}}>Paychecks</strong> tab</div>
                )}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <div><div style={{fontSize:9,color:T.muted,marginBottom:4,letterSpacing:1}}>ANCHOR DATE</div><input style={{...INP,fontSize:12,padding:"8px 10px"}} type="date" value={data.proximoCobro||""} onChange={e=>setData(p=>({...p,proximoCobro:e.target.value}))}/></div>
                  <div><div style={{fontSize:9,color:T.muted,marginBottom:4,letterSpacing:1}}>FREQUENCY</div><select style={{...INP,fontSize:12,padding:"8px 10px"}} value={data.payFreq||"biweekly"} onChange={e=>setData(p=>({...p,payFreq:e.target.value}))}><option value="weekly">Weekly</option><option value="biweekly">Biweekly</option><option value="semimonthly">Semi-monthly</option><option value="monthly">Monthly</option></select></div>
                </div>
                <div style={{background:T.surface2,borderRadius:8,padding:"7px 10px",fontSize:10,color:T.muted,lineHeight:1.6}}>
                  <span>{monthPeriods.length} period{monthPeriods.length!==1?"s":""} · Current: <strong style={{color:T.text}}>{currentPeriod?fmd(currentPeriod.payday):"-"}</strong> · </span>
                  <span style={{color:"#3fb950",fontWeight:600}}>Next: {nextPayday?fmd(nextPayday):"-"} ({diasProx===0?"today":diasProx!=null?diasProx+"d":"—"})</span>
                </div>
              </>);
            })()}
          </div>
          {/* 2. Appearance */}
          <div style={{...CARD,padding:"12px 14px",marginBottom:10}}>
            <div style={{fontSize:10,color:T.accent,letterSpacing:1.5,fontWeight:700,marginBottom:10}}>🎨 APPEARANCE</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {[
                {id:"dark",   label:"Azul",    bg:"#080c14", accent:"#58a6ff"},
                {id:"violet", label:"Violeta", bg:"#0a0814", accent:"#a78bfa"},
                {id:"green",  label:"Verde",   bg:"#08140c", accent:"#3fb950"},
                {id:"pink",   label:"Rosa",    bg:"#140810", accent:"#ec4899"},
                {id:"orange", label:"Naranja", bg:"#140e08", accent:"#f97316"},
                {id:"black",  label:"Negro",   bg:"#000000", accent:"#ffffff"},
                {id:"copper", label:"Cobre",   bg:"#130f08", accent:"#c2823a"},
                {id:"teal",   label:"Teal",    bg:"#08141a", accent:"#06b6d4"},
                {id:"gold",   label:"Dorado",  bg:"#14110a", accent:"#d29922"},
                {id:"light",  label:"Blanco",  bg:"#f0f4f8", accent:"#0969da"},
              ].map(th=>{
                const isSel=theme===th.id;
                return(<button key={th.id} onClick={()=>{setData(p=>({...p,theme:th.id}));toast_(`${th.label} ✓`);}}
                  style={{...BTN,display:"flex",alignItems:"center",gap:8,padding:"7px 12px 7px 8px",borderRadius:20,
                    background:isSel?`${th.accent}18`:T.surface2,
                    border:isSel?`1px solid ${th.accent}`:`1px solid ${T.border}`,transition:"all 0.15s"}}>
                  <div style={{width:20,height:20,borderRadius:"50%",background:th.bg,border:`2.5px solid ${th.accent}`,flexShrink:0}}/>
                  <span style={{fontSize:11,fontWeight:isSel?700:400,color:isSel?th.accent:T.muted}}>{th.label}</span>
                  {isSel&&<span style={{fontSize:10,color:th.accent}}>✓</span>}
                </button>);
              })}
            </div>
          </div>
          {/* 3. Backup */}
          <div style={{...CARD,padding:"12px 14px",marginBottom:10}}>
            <div style={{fontSize:10,color:T.accent,letterSpacing:1.5,fontWeight:700,marginBottom:8}}>💾 DATA BACKUP</div>
            <div style={{display:"flex",gap:8}}>
              <button style={{...BTN,flex:1,padding:"9px",background:T.surface2,color:T.muted,fontSize:12,border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",alignItems:"center",gap:1}} onClick={exportData}><span>📥 Save Backup</span><span style={{fontSize:9,opacity:0.6}}>Download copy</span></button>
              <label style={{flex:1}}><input type="file" accept=".json" onChange={importData} style={{display:"none"}}/><div style={{padding:"9px",background:T.surface2,color:T.muted,fontSize:12,border:`1px solid ${T.border}`,textAlign:"center",cursor:"pointer",borderRadius:10,fontWeight:600,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}><span>📤 Load Backup</span><span style={{fontSize:9,opacity:0.6}}>Import file</span></div></label>
            </div>
          </div>
          {/* 4. Danger */}
          <div style={{background:"rgba(248,81,73,0.04)",border:"1px solid rgba(248,81,73,0.2)",borderRadius:14,padding:"10px 14px"}}>
            <div style={{fontSize:10,color:"#f85149",letterSpacing:1.5,fontWeight:700,marginBottom:8}}>⚠️ DANGER ZONE</div>
            <button style={{...BTN,width:"100%",padding:"10px",background:"rgba(248,81,73,0.1)",color:"#f85149",fontSize:13,border:"1px solid rgba(248,81,73,0.3)"}} onClick={()=>setResetAllConfirm(true)}>🗑 Reset All Data</button>
          </div>
        </div>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
