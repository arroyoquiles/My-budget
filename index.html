};

const calcLoan=(balance,apr,pmt)=>{
  const b=n(balance),r=n(apr)/100/12,p=n(pmt);
  if(b<=0||p<=0)return{interest:0,principal:0,newBalance:0};
  const interest=b*r;
  const principal=Math.min(p-interest,b);
  return{interest:Math.max(0,interest),principal:Math.max(0,principal),newBalance:Math.max(0,b-principal)};
};

// ── Pay period engine ─────────────────────────────────────────────────────────
const parseAnchor=anchor=>{
  const[y,m,d]=anchor.split("-").map(Number);
  const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return dt;
};

const getPaydaysInMonth=(anchor,freq,yr,mth)=>{
  if(freq==="semimonthly")return[new Date(yr,mth,1),new Date(yr,mth,15)];
  if(freq==="monthly"){
    const base=parseAnchor(anchor);
    const last=new Date(yr,mth+1,0).getDate();
    return[new Date(yr,mth,Math.min(base.getDate(),last))];
  }
  const step=freq==="weekly"?7:14;
  const base=parseAnchor(anchor);
  const monthStart=new Date(yr,mth,1);
  const monthEnd=new Date(yr,mth+1,0);monthEnd.setHours(23,59,59,999);
  const diffDays=Math.round((monthStart.getTime()-base.getTime())/86400000);
  const startN=Math.ceil(diffDays/step);
  const days=[];
  for(let i=startN;i<=startN+8;i++){
    const pd=new Date(base.getTime()+i*step*86400000);
    if(pd>monthEnd)break;
    if(pd>=monthStart)days.push(pd);
  }
  return days;
};

const getCurrentPeriodStart=(anchor,freq)=>{
  const today=new Date();today.setHours(0,0,0,0);
  if(freq==="semimonthly"){
    const d1=new Date(today.getFullYear(),today.getMonth(),1);
    const d15=new Date(today.getFullYear(),today.getMonth(),15);
    return today>=d15?d15:d1;
  }
  if(freq==="monthly"){
    const base=parseAnchor(anchor);
    let pday=new Date(today.getFullYear(),today.getMonth(),base.getDate());
    if(pday>today)pday=new Date(pday.getFullYear(),pday.getMonth()-1,base.getDate());
    return pday;
  }
  const step=freq==="weekly"?7:14;
  const base=parseAnchor(anchor);
  const diffDays=Math.round((today.getTime()-base.getTime())/86400000);
  const periodsDone=today>=base?Math.floor(diffDays/step):0;
  return new Date(base.getTime()+periodsDone*step*86400000);
};

const getNextPayday=(anchor,freq)=>{
  const today=new Date();today.setHours(0,0,0,0);
  if(freq==="semimonthly"){
    const d1=new Date(today.getFullYear(),today.getMonth(),1);
    const d15=new Date(today.getFullYear(),today.getMonth(),15);
    const nm1=new Date(today.getFullYear(),today.getMonth()+1,1);
    return today>=d15?nm1:d15;
  }
  if(freq==="monthly"){
    const base=parseAnchor(anchor);
    let pday=new Date(today.getFullYear(),today.getMonth(),base.getDate());
    if(pday>today)pday=new Date(pday.getFullYear(),pday.getMonth()-1,base.getDate());
    return new Date(pday.getFullYear(),pday.getMonth()+1,base.getDate());
  }
  const step=freq==="weekly"?7:14;
  const base=parseAnchor(anchor);
  const diffDays=Math.round((today.getTime()-base.getTime())/86400000);
  const periodsDone=today>=base?Math.floor(diffDays/step):0;
  const curStart=new Date(base.getTime()+periodsDone*step*86400000);
  return new Date(curStart.getTime()+step*86400000);
};

const getUpcomingPaydays=(anchor,count=8,freq="biweekly")=>{
  const today=new Date();today.setHours(0,0,0,0);
  const days=[];
  if(freq==="semimonthly"){
    let d=new Date(today.getFullYear(),today.getMonth(),1);
    while(days.length<count){
      const d1=new Date(d.getFullYear(),d.getMonth(),1);
      const d15=new Date(d.getFullYear(),d.getMonth(),15);
      if(d1>=today)days.push(new Date(d1));
      if(d15>=today&&days.length<count)days.push(new Date(d15));
      d=new Date(d.getFullYear(),d.getMonth()+1,1);
    }
    return days.slice(0,count);
  }
  if(freq==="monthly"){
    const base=parseAnchor(anchor);
    let d=new Date(today.getFullYear(),today.getMonth(),base.getDate());
    if(d<today)d=new Date(d.getFullYear(),d.getMonth()+1,base.getDate());
    while(days.length<count){days.push(new Date(d));d=new Date(d.getFullYear(),d.getMonth()+1,d.getDate());}
    return days;
  }
  const step=freq==="weekly"?7:14;
  const base=parseAnchor(anchor);
  const diffDays=Math.round((today.getTime()-base.getTime())/86400000);
  const periodsDone=today>=base?Math.floor(diffDays/step):0;
  const curStart=new Date(base.getTime()+periodsDone*step*86400000);
  let cur=new Date(curStart.getTime()+step*86400000);
  while(days.length<count){days.push(new Date(cur));cur=new Date(cur.getTime()+step*86400000);}
  return days.slice(0,count);
};

const buildMonthPeriods=(anchor,freq)=>{
  const today=new Date();today.setHours(0,0,0,0);
  const yr=today.getFullYear(),mth=today.getMonth();
  const paydays=getPaydaysInMonth(anchor,freq,yr,mth);
  const curStart=getCurrentPeriodStart(anchor,freq);
  const curKey="period_"+dateStr(curStart);
  let curIdx=-1;
  paydays.forEach((pd,i)=>{if("period_"+dateStr(pd)===curKey)curIdx=i;});
  return paydays.map((pd,i)=>({
    id:"period_"+dateStr(pd),
    payday:pd,
    label:`Check ${i+1}`,
    num:i+1,
    isCurrent:"period_"+dateStr(pd)===curKey,
    isUpcoming:curIdx>=0?i===curIdx+1:i===0,
    statusLabel:"period_"+dateStr(pd)===curKey?"Current":(curIdx>=0&&i===curIdx+1?"Upcoming":null),
  }));
};

// ── Migration ─────────────────────────────────────────────────────────────────
const migrate=raw=>{
  if(!raw)return null;
  const dm={savings:"savings_acct",directo:"rent",temporal:"temp",ninguno:"other",tarjeta:"credit_card",savings_acct:"savings_acct",credit_card:"credit_card",rent:"rent",utilities:"utilities",auto:"auto",insurance:"insurance",groceries:"groceries",subscription:"subscription",gas:"gas",emergency:"emergency",investment:"investment",temp:"temp",other:"other"};
  const cm={carro:"auto",vivienda:"rent",servicios:"subscription",gas:"gas",tarjeta:"credit_card",comida:"groceries",otro:"other",auto:"auto",rent:"rent",subscription:"subscription",credit_card:"credit_card",groceries:"groceries",other:"other",insurance:"insurance",utilities:"utilities"};
  const mg=g=>({...g,cat:cm[g.cat]||cm[g.categoria]||"other",destino:dm[g.destino]||"other",diaPago:g.diaPago||null,tarjetaRef:g.tarjetaRef||"",state:g.state||(g.pagado?"paid":"pending"),_quick:g._quick||false});

  const anchor=raw.proximoCobro||"2026-04-03";
  const freq=raw.payFreq||"biweekly";

  let periods=raw.periods||{};

  if(!raw.periods){
    const curStart=getCurrentPeriodStart(anchor,freq);
    const curKey="period_"+dateStr(curStart);
    let prevStart;
    if(freq==="semimonthly"){
      const d1=new Date(curStart.getFullYear(),curStart.getMonth(),1);
      const d15=new Date(curStart.getFullYear(),curStart.getMonth(),15);
      prevStart=curStart.getDate()===15?d1:new Date(curStart.getFullYear(),curStart.getMonth()-1,15);
    } else if(freq==="monthly"){
      prevStart=new Date(curStart.getFullYear(),curStart.getMonth()-1,curStart.getDate());
    } else {
      const step=(freq==="weekly"?7:14)*86400000;
      prevStart=new Date(curStart.getTime()-step);
    }
    const prevKey="period_"+dateStr(prevStart);
    const legacyChecks=raw.checks||[{id:"c1",num:1},{id:"c2",num:2}];
    legacyChecks.forEach((c,i)=>{
      const gastos=(raw[`${c.id}_gastos`]||raw[`check${c.num}_gastos`]||raw[`cheque${c.num}_gastos`]||[]).map(mg);
      const amt=n(raw[c.id]||raw[`check${c.num}`]||raw[`cheque${c.num}`]||0);
      if(gastos.length>0||amt>0){
        const key=i===0?curKey:prevKey;
        if(!periods[key])periods[key]={gastos:[]};
        periods[key].gastos=[...(periods[key].gastos||[]),...gastos];
        // Do NOT store amount here — legacy data will fall back to global checkAmount
      }
    });
    const defaultAmt=n(raw.c1||raw.c2||raw.check1||raw.check2||raw.cheque1||raw.cheque2||1520);
    if(!raw.checkAmount)raw.checkAmount=defaultAmt;
  } else {
    Object.keys(periods).forEach(k=>{
      if(periods[k].gastos)periods[k]={...periods[k],gastos:periods[k].gastos.map(mg)};
    });
  }

  return{
    proximoCobro:anchor,
    payFreq:freq,
    theme:raw.theme||"dark",
    checkAmount:n(raw.checkAmount||raw.c1||raw.c2||raw.check1||raw.check2||raw.cheque1||raw.cheque2||1520),
    periods,
    tarjetas:(raw.tarjetas||[]).map(t=>({...t,fechaPago:t.fechaPago||"",fechaCorte:t.fechaCorte||"",historial:t.historial||[],tipo:"card"})),
    loans:(raw.loans||DD.loans).map(l=>({...l,tipo:"loan"})),
    pots:raw.pots||{savings_acct:0,emergency:0,investment:0},
    potMovements:raw.potMovements||[],
    snapshots:raw.snapshots||[],
    ahorro:raw.ahorro||null,
    _sa:raw._sa||"",
  };
};

const DragList=memo(({items,onReorder,renderItem})=>{
  const [drag,setDrag]=useState(null),[over,setOver]=useState(null);
  const refs=useRef([]),ti=useRef(null),moved=useRef(false);
  const commit=(f,t)=>{if(f!==null&&t!==null&&f!==t){const c=[...items];const d=c.splice(f,1)[0];c.splice(t,0,d);onReorder(c);}setDrag(null);setOver(null);};
  const onTS=(e,i)=>{ti.current=i;moved.current=false;};
  const onTM=(e,i)=>{moved.current=true;e.preventDefault();e.stopPropagation();setDrag(i);const y=e.touches[0].clientY;let best=i,mn=Infinity;refs.current.forEach((r,idx)=>{if(!r)return;const rc=r.getBoundingClientRect();const d=Math.abs(y-(rc.top+rc.height/2));if(d<mn){mn=d;best=idx;}});setOver(best);};
  const onTE=()=>{if(moved.current)commit(ti.current,over);ti.current=null;moved.current=false;setDrag(null);setOver(null);};
  return(<div>{items.map((item,i)=>(<div key={item.id} ref={el=>refs.current[i]=el} style={{opacity:drag===i?0.35:1,transition:"opacity 0.1s"}}>{renderItem(item,i,{onTouchStart:e=>onTS(e,i),onTouchMove:e=>onTM(e,i),onTouchEnd:onTE})}</div>))}</div>);
});

const GastoItem=memo(({item,pid,editId,setEditId,tarjetas,onCycle,onLongPress,onUpdate,onRemove,touch,T})=>{
  const dest=gds(item.destino,item.tarjetaRef);
  const INP=mkINP(T),BTN=mkBTN(),CARD=mkCARD(T);
  const pressTimer=useRef(null);
  const hTS=()=>{pressTimer.current=setTimeout(()=>onLongPress(item.id),500);};

          <button style={{...BTN,padding:"10px",background:"rgba(248,81,73,0.07)",color:"#f85149",fontSize:12,border:"1px solid rgba(248,81,73,0.22)"}} onClick={()=>{setAccion({id:debt.id,tipo:"gasto"});setMontoAccion("");}}>🛒 Charge</button>
        </div>)

const DestinoSummary=memo(({gastos,T})=>{

  const entries=Object.entries(bd).filter(([,v])=>v.total>0&&v.d!=="other");
  if(!entries.length)return null;
  return(<div style={{marginBottom:14}}>
    <div style={{fontSize:10,color:T.muted,letterSpacing:1.5,fontWeight:700,marginBottom:8}}>BREAKDOWN BY DESTINATION</div>
    <div style={{border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
      {entries.map(([k,v],i)=>{const d=gds(v.d,v.r);return(
        <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:i%2===0?T.surface:T.bg,borderBottom:i<entries.length-1?`1px solid ${T.border}`:"none"}}>
          <span style={{fontSize:12,color:d.color,fontWeight:600}}>{d.icon} {d.label}</span>
          <span style={{fontFamily:"monospace",fontWeight:800,color:d.color,fontSize:13}}>{fmt(v.total)}</span>
        </div>);})}
    </div>
  </div>);
});

function App(){

  const [addingDebt,setAddingDebt]=useState(null);
  const [quickOpen,setQuickOpen]=useState(false);
  const [quickNote,setQuickNote]=useState("");
  const [quickAmt,setQuickAmt]=useState("");
  const [quickPid,setQuickPid]=useState("");
  const [moveOpen,setMoveOpen]=useState(false);
  const [moveTo,setMoveTo]=useState("savings_acct");
  const [moveAmt,setMoveAmt]=useState("");
  const [moveNote,setMoveNote]=useState("");
  const toastRef=useRef();
  const swipeStart=useRef(null);
  const mainRef=useRef(null);

  const theme=data.theme||"dark";
  const T=THEMES[theme];
  useEffect(()=>{document.body.className=theme;},[theme]);
  useEffect(()=>{localStorage.setItem(SK,JSON.stringify(data));},[data]);

  const toast_=(msg,type="ok")=>{setToast({msg,type});clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),2800);};
  const INP=mkINP(T),BTN=mkBTN(),CARD=mkCARD(T);

  const freq=data.payFreq||"biweekly";
  const anchor=data.proximoCobro||"2026-04-03";
  const globalCheckAmount=n(data.checkAmount||1520);
  const today=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);

  const monthPeriods=useMemo(()=>buildMonthPeriods(anchor,freq),[anchor,freq,today]);
  const currentPeriod=monthPeriods.find(p=>p.isCurrent)||monthPeriods[0];
  const currentPid=currentPeriod?.id||"";

  const upcomingPaydays=useMemo(()=>getUpcomingPaydays(anchor,8,freq),[anchor,freq,today]);
  const nextPayday=useMemo(()=>getNextPayday(anchor,freq),[anchor,freq,today]);
  const diasProx=nextPayday?Math.ceil((nextPayday-today)/86400000):null;

  // Helper: get gastos for a period
  const getPGastos=pid=>(data.periods[pid]||{}).gastos||[];

  // Helper: get the effective amount for a period (period-specific or fall back to global)
  const getPeriodAmount=useCallback(pid=>{
    const stored=(data.periods[pid]||{}).amount;
    if(stored!=null&&stored!==undefined&&n(stored)>0)return n(stored);
    return globalCheckAmount;
  },[data.periods,globalCheckAmount]);

  // Helper: set period-specific amount
  const setPeriodAmount=useCallback((pid,val)=>{
    setData(p=>({
      ...p,
      periods:{
        ...p.periods,
        [pid]:{
          ...(p.periods[pid]||{}),
          amount:parseFloat(val)||0,
        }
      }
    }));
  },[]);

  // Monthly totals using each period's real amount
  const totalMonthlyIncome=monthPeriods.reduce((s,p)=>s+getPeriodAmount(p.id),0);
  const totalMonthlyExp=monthPeriods.reduce((s,p)=>s+getPGastos(p.id).reduce((ss,g)=>ss+n(g.monto),0),0);

  const allDebts=[...data.tarjetas.map(t=>({...t,tipo:"card"})),...(data.loans||[]).map(l=>({...l,tipo:"loan"}))].sort((a,b)=>n(b.interes)-n(a.interes));
  const totalDebt=allDebts.reduce((s,d)=>s+n(d.balance),0);
  const interesTotal=allDebts.reduce((s,d)=>s+(n(d.interes)/100/12)*n(d.balance),0);
  const urgentDebts=allDebts.filter(d=>getDU(d.fechaPago)!==null&&getDU(d.fechaPago)<=3);
  const pots=data.pots||{};
  const potMovements=data.potMovements||[];

  useEffect(()=>{if(!quickPid&&currentPid)setQuickPid(currentPid);},[currentPid]);

  const TABS_ORDER=useMemo(()=>["overview",...monthPeriods.map(p=>p.id),"debts","calendar","history","settings"],[monthPeriods]);
  const handleSwipeTouchStart=useCallback(e=>{const t=e.touches[0];swipeStart.current={x:t.clientX,y:t.clientY};},[]);
  const handleSwipeTouchEnd=useCallback(e=>{
    if(!swipeStart.current)return;
    const t=e.changedTouches[0];
    const dx=t.clientX-swipeStart.current.x,dy=t.clientY-swipeStart.current.y;
    swipeStart.current=null;
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return;
    const idx=TABS_ORDER.indexOf(tab);
    if(dx<0&&idx<TABS_ORDER.length-1)setTab(TABS_ORDER[idx+1]);
    if(dx>0&&idx>0)setTab(TABS_ORDER[idx-1]);
  },[tab,TABS_ORDER]);

  // Period CRUD helpers
  const updPeriodGastos=(pid,fn)=>setData(p=>{
    const cur=(p.periods[pid]||{}).gastos||[];
    return{...p,periods:{...p.periods,[pid]:{...(p.periods[pid]||{}),gastos:fn(cur)}}};
  });

  const cycleState=useCallback((pid,id)=>updPeriodGastos(pid,g=>g.map(x=>x.id!==id?x:{...x,state:x.state==="paid"?"pending":"paid",pagado:x.state!=="paid"})),[]);
  const setReserved=useCallback((pid,id)=>updPeriodGastos(pid,g=>g.map(x=>x.id!==id?x:{...x,state:x.state==="reserved"?"pending":"reserved",pagado:false})),[]);
  const updateGasto=useCallback((pid,id,f,v)=>updPeriodGastos(pid,g=>g.map(x=>x.id===id?{...x,[f]:v}:x)),[]);
  const removeGasto=useCallback((pid,id)=>updPeriodGastos(pid,g=>g.filter(x=>x.id!==id)),[]);
  const reorder=useCallback((pid,list)=>updPeriodGastos(pid,()=>list),[]);
  const addGasto=useCallback(pid=>{
    const nid=Date.now();
    updPeriodGastos(pid,g=>[...g,{id:nid,nombre:"",monto:0,cat:"other",state:"pending",pagado:false,destino:"other",tarjetaRef:"",diaPago:null,_quick:false}]);
    setTimeout(()=>setEditId(nid),30);
  },[]);
  const resetCheck=useCallback((pid,label)=>{
    updPeriodGastos(pid,g=>g.filter(x=>x.destino!=="temp"&&!x._quick).map(x=>({...x,state:"pending",pagado:false})));
    toast_(`🔄 ${label} reset`);
  },[]);

  const updateTarjeta=useCallback((id,f,v)=>setData(p=>({...p,tarjetas:p.tarjetas.map(t=>t.id===id?{...t,[f]:v}:t)})),[]);
  const updateLoan=useCallback((id,f,v)=>setData(p=>({...p,loans:(p.loans||[]).map(l=>l.id===id?{...l,[f]:v}:l)})),[]);
  const removeTarjeta=useCallback(id=>{setData(p=>({...p,tarjetas:p.tarjetas.filter(t=>t.id!==id)}));toast_("🗑 Removed");},[]);
  const removeLoan=useCallback(id=>{setData(p=>({...p,loans:(p.loans||[]).filter(l=>l.id!==id)}));toast_("🗑 Removed");},[]);
  const applyAccion=useCallback((id,tipo)=>{
    const m=parseFloat(montoAccion);if(!m||m<=0)return toast_("Invalid amount","err");
    const entry={fecha:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),tipo:accion.tipo,monto:m};
    if(tipo==="card")setData(p=>({...p,tarjetas:p.tarjetas.map(t=>t.id!==id?t:{...t,balance:accion.tipo==="pago"?Math.max(0,n(t.balance)-m):n(t.balance)+m,historial:[entry,...(t.historial||[])].slice(0,10)})}));
    else setData(p=>({...p,loans:(p.loans||[]).map(l=>l.id!==id?l:{...l,balance:accion.tipo==="pago"?Math.max(0,n(l.balance)-m):n(l.balance)+m,historial:[entry,...(l.historial||[])].slice(0,10)})}));
    setAccion(null);setMontoAccion("");toast_(accion.tipo==="pago"?"✅ Payment recorded":"📝 Charge recorded");
  },[montoAccion,accion]);
  const addCard=useCallback(()=>{const id=Date.now();setData(p=>({...p,tarjetas:[...p.tarjetas,{id,nombre:"New Card",balance:0,limite:0,minimo:0,interes:0,fechaCorte:"",fechaPago:"",historial:[],tipo:"card"}]}));setAddingDebt({id,tipo:"card"});},[]);
  const addLoan=useCallback(()=>{const id=Date.now();setData(p=>({...p,loans:[...(p.loans||[]),{id,nombre:"New Loan",balance:0,original:0,minimo:0,interes:0,fechaPago:"",historial:[],tipo:"loan"}]}));setAddingDebt({id,tipo:"loan"});},[]);

  const addQuickExpense=()=>{
    const m=parseFloat(quickAmt);if(!m||m<=0||!quickNote.trim())return toast_("Add name and amount","err");
    const pid=quickPid||currentPid;
    const nid=Date.now();
    updPeriodGastos(pid,g=>[...g,{id:nid,nombre:quickNote.trim(),monto:m,cat:"other",state:"paid",pagado:true,destino:"temp",tarjetaRef:"",diaPago:null,_quick:true}]);
    setQuickNote("");setQuickAmt("");setQuickOpen(false);
    toast_(`✅ "${quickNote.trim()}" ${fmt(m)} added & paid`);
  };

  const doMoveMoney=()=>{
    const m=parseFloat(moveAmt);if(!m||m<=0)return toast_("Invalid amount","err");
    const mvId=Date.now();const pot=POTS[moveTo];
    setData(p=>({...p,pots:{...p.pots,[moveTo]:n((p.pots||{})[moveTo])+m},potMovements:[...(p.potMovements||[]),{id:mvId,potKey:moveTo,amount:m,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),note:moveNote||pot?.label||moveTo}]}));
    setMoveAmt("");setMoveNote("");setMoveOpen(false);
    toast_(`💸 ${fmt(m)} moved to ${pot?.label||moveTo}`);
  };
  const revertMovement=useCallback(mvId=>{
    setData(p=>{const mv=(p.potMovements||[]).find(m=>m.id===mvId);if(!mv)return p;
      return{...p,pots:{...p.pots,[mv.potKey]:Math.max(0,n((p.pots||{})[mv.potKey])-mv.amount)},potMovements:(p.potMovements||[]).filter(m=>m.id!==mvId)};
    });toast_("↩️ Movement reverted");
  },[]);

  const exportData=useCallback(()=>{
    const now=new Date();const ts=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}_${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}`;
    const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`mybudget_${ts}.json`;a.click();toast_("📥 Exported");
  },[data]);
  const importData=useCallback(e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{setData(migrate(JSON.parse(ev.target.result)));toast_("✅ Imported");}catch{toast_("❌ Invalid file","err");}};r.readAsText(f);},[]);

  const renderGrouped=(pid,gastos)=>{
    const groups={};
    gastos.forEach(g=>{const k=g.destino==="credit_card"?(g.tarjetaRef||"Credit Card"):g.destino;if(!groups[k])groups[k]={d:g.destino,r:g.tarjetaRef,items:[]};groups[k].items.push(g);});
    return Object.keys(groups).sort((a,b)=>(DORDER.indexOf(groups[a].d)+1||99)-(DORDER.indexOf(groups[b].d)+1||99)).map(k=>{
      const{d,r,items}=groups[k];const dst=gds(d,r);const sub=items.reduce((s,g)=>s+n(g.monto),0);
      return(<div key={k} style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",marginBottom:5,background:dst.bg,borderRadius:9,border:`1px solid ${dst.border}`}}>
          <span style={{fontSize:12,fontWeight:700,color:dst.color}}>{dst.icon} {dst.label}</span>
          <span style={{fontFamily:"monospace",fontSize:13,fontWeight:800,color:dst.color}}>{fmt(sub)}</span>
        </div>
        <DragList items={items} onReorder={newItems=>{const rest=gastos.filter(g=>!items.find(i=>i.id===g.id));reorder(pid,[...newItems,...rest]);}}
          renderItem={(item,_,touch)=>(<GastoItem key={item.id} item={item} pid={pid} editId={editId} setEditId={setEditId} tarjetas={data.tarjetas}
            onCycle={id=>cycleState(pid,id)} onLongPress={id=>setReserved(pid,id)}
            onUpdate={(id,f,v)=>updateGasto(pid,id,f,v)} onRemove={id=>removeGasto(pid,id)} touch={touch} T={T}/>)}/>
      </div>);
    });
  };

  const renderCheckTab=(period)=>{
    const{id:pid,label,isCurrent,isUpcoming,statusLabel,payday}=period;
    const gastos=getPGastos(pid);
    // Use per-period amount (falls back to global if not set)
    const amt=getPeriodAmount(pid);
    const periodAmountIsCustom=(data.periods[pid]||{}).amount!=null&&n((data.periods[pid]||{}).amount)>0&&n((data.periods[pid]||{}).amount)!==globalCheckAmount;
    const total=gastos.reduce((s,g)=>s+n(g.monto),0);
    const paid=gastos.filter(g=>g.state==="paid").reduce((s,g)=>s+n(g.monto),0);
    const reserved=gastos.filter(g=>g.state==="reserved").reduce((s,g)=>s+n(g.monto),0);
    const sob=amt-total;
    const pct=total>0?Math.round(((paid+reserved)/total)*100):0;
    const done=gastos.length>0&&gastos.every(g=>g.state==="paid");
    const pdDays=Math.ceil((payday-today)/86400000);
    return(<div className="anim">
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {isCurrent&&<div style={{flex:1,background:"rgba(88,166,255,0.1)",border:"1px solid rgba(88,166,255,0.3)",borderRadius:10,padding:"8px 12px",fontSize:11,color:"#58a6ff",fontWeight:600}}>✓ Active check period</div>}
        {payday&&<div style={{flex:1,background:pdDays===0?"rgba(88,166,255,0.1)":"rgba(63,185,80,0.07)",border:`1px solid ${pdDays===0?"rgba(88,166,255,0.3)":"rgba(63,185,80,0.2)"}`,borderRadius:10,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:T.muted}}>📅 Payday</span>
          <div style={{textAlign:"right"}}>
            <span style={{fontFamily:"monospace",fontWeight:700,color:pdDays===0?"#58a6ff":"#3fb950",fontSize:12}}>{fmd(payday)}</span>
            {pdDays===0&&<div style={{fontSize:9,color:"#58a6ff",fontWeight:700}}>TODAY 🎉</div>}
          </div>
        </div>}
      </div>
      <div style={{...CARD,padding:"13px 16px",marginBottom:12,borderColor:T.accent}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
          <div style={{fontSize:10,color:T.accent,fontWeight:700,letterSpacing:1.5}}>{label.toUpperCase()} AMOUNT</div>
          {periodAmountIsCustom&&(
            <button style={{...BTN,padding:"2px 8px",fontSize:10,background:"rgba(210,153,34,0.1)",color:"#d29922",border:"1px solid rgba(210,153,34,0.3)"}}
              onClick={()=>setData(p=>{const np={...p.periods};if(np[pid]){const{amount:_,...rest}=np[pid];np[pid]=rest;}return{...p,periods:np};})}>
              ↩ Use default ({fmt(globalCheckAmount)})
            </button>
          )}
        </div>
        <input style={{...INP,fontFamily:"monospace",fontSize:22,fontWeight:700}} type="number" inputMode="decimal"
          value={amt||""}
          onChange={e=>setPeriodAmount(pid,e.target.value)}
          placeholder={String(globalCheckAmount)}/>
        {!periodAmountIsCustom&&<div style={{fontSize:10,color:T.muted,marginTop:5}}>Using default amount · edit to override for this check only</div>}
      </div>
      <div style={{...CARD,padding:"13px 16px",marginBottom:12,borderColor:done?"#2ea043":T.border}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:done?"#3fb950":T.text}}>{done?"✅ All paid!":`${fmt(paid)} paid · ${fmt(reserved)} reserved`}</div>
            <div style={{fontSize:11,color:T.muted,marginTop:2}}>Pending: <span style={{color:"#f85149",fontWeight:700}}>{fmt(total-paid-reserved)}</span></div>
          </div>
          <div style={{fontFamily:"monospace",fontSize:20,fontWeight:800,color:done?"#3fb950":"#d29922"}}>{pct}%</div>
        </div>
        <div style={{height:7,background:T.surface2,borderRadius:8,overflow:"hidden",display:"flex"}}>
          <div style={{width:`${total>0?Math.round((paid/total)*100):0}%`,background:"#2ea043",transition:"width 0.5s"}}/>
          <div style={{width:`${total>0?Math.round((reserved/total)*100):0}%`,background:"#d29922",transition:"width 0.5s"}}/>
        </div>
        <div style={{display:"flex",gap:12,marginTop:6,fontSize:10}}>
          <span>Tap ● = paid · Long press ◑ = reserved</span>
        </div>
      </div>
      <DestinoSummary gastos={gastos} T={T}/>
      {renderGrouped(pid,gastos)}
      <button style={{...BTN,width:"100%",marginTop:4,marginBottom:12,padding:"11px",background:"transparent",color:T.accent,fontSize:13,border:`1.5px dashed ${T.border}`}} onClick={()=>addGasto(pid)}>+ Add Expense</button>
      <div style={{...CARD,padding:"13px 16px",marginBottom:10,borderColor:sob>=0?"#238636":"#da3633"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:12,color:T.muted}}>Total expenses</span><span style={{fontFamily:"monospace",fontWeight:700,color:"#f85149"}}>{fmt(total)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:14,fontWeight:700}}>Left over</span><span style={{fontFamily:"monospace",fontSize:20,fontWeight:800,color:sob>=0?"#3fb950":"#f85149"}}>{fmt(sob)}</span></div>
      </div>
      <button style={{...BTN,width:"100%",padding:"11px",background:"rgba(248,81,73,0.08)",color:"#f85149",fontSize:13,border:"1px solid rgba(248,81,73,0.25)"}} onClick={()=>resetCheck(pid,label)}>🔄 New Cycle — Reset {label}</button>
    </div>);
  };

  const TABS=[
    {id:"overview",icon:"📊",label:"Overview"},
    ...monthPeriods.map(p=>({id:p.id,icon:p.isCurrent?"💰":"📋",label:p.label,statusLabel:p.statusLabel,isCurrent:p.isCurrent})),
    {id:"debts",   icon:"💳",label:"Debts",urgent:urgentDebts.length>0},
    {id:"calendar",icon:"📅",label:"Calendar"},
    {id:"history", icon:"📆",label:"History"},
    {id:"settings",icon:"⚙️",label:"Settings"},
  ];

  return(
    <div ref={mainRef} onTouchStart={handleSwipeTouchStart} onTouchEnd={handleSwipeTouchEnd}
      style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}.anim{animation:fadeUp 0.22s ease;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
        input[type=range]{width:100%;accent-color:#58a6ff;}
        .c{max-width:500px;margin:0 auto;padding:14px 14px 50px;}
        @media(min-width:768px){.c{max-width:640px;padding:22px 24px 60px;}}
        @media(min-width:1024px){.c{max-width:760px;}}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:14px;}
        .tabs::-webkit-scrollbar{display:none;}
      `}</style>

      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:9999,background:toast.type==="err"?"#da3633":"#238636",color:"#fff",padding:"10px 16px",borderRadius:11,fontWeight:600,fontSize:13,boxShadow:"0 8px 24px rgba(0,0,0,0.4)"}}>{toast.msg}</div>}

      {urgentDebts.length>0&&!alertDim&&(
        <div style={{background:"linear-gradient(135deg,#f85149,#da3633)",padding:"12px 16px",position:"sticky",top:0,zIndex:100}}>
          <div style={{maxWidth:760,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:800,fontSize:13,marginBottom:3,animation:"pulse 1.5s infinite"}}>🚨 PAYMENT DUE SOON!</div>
              {urgentDebts.map(d=><div key={d.id} style={{fontSize:12,opacity:0.9}}><strong>{d.nombre}</strong> — <strong>{getDU(d.fechaPago)===0?"TODAY":getDU(d.fechaPago)+"d left"}</strong> · {fmt(d.balance)}</div>)}
            </div>
            <button style={{...BTN,background:"rgba(255,255,255,0.2)",color:"#fff",padding:"4px 10px",fontSize:12,marginLeft:8}} onClick={()=>setAlertDim(true)}>OK</button>
          </div>
        </div>
      )}

      <button style={{...BTN,position:"fixed",bottom:22,right:18,zIndex:200,width:52,height:52,borderRadius:"50%",background:"#238636",color:"#fff",fontSize:26,boxShadow:"0 4px 20px rgba(35,134,54,0.5)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setQuickOpen(true)}>+</button>

      {quickOpen&&(<div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.72)",display:"flex",alignItems:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)setQuickOpen(false);}}>
        <div style={{width:"100%",maxWidth:500,margin:"0 auto",background:T.surface,borderRadius:"20px 20px 0 0",padding:"20px 18px 34px",border:`1px solid ${T.border}`}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>⚡ Quick Expense</div>
          <div style={{marginBottom:10}}><div style={{fontSize:10,color:T.muted,marginBottom:5}}>WHAT WAS IT?</div><input style={INP} value={quickNote} onChange={e=>setQuickNote(e.target.value)} placeholder="e.g. Walmart, gas stop..." autoFocus/></div>
          <div style={{marginBottom:10}}><div style={{fontSize:10,color:T.muted,marginBottom:5}}>AMOUNT ($)</div><input style={INP} type="number" inputMode="decimal" value={quickAmt} onChange={e=>setQuickAmt(e.target.value)} placeholder="0"/></div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:T.muted,marginBottom:5}}>DEDUCT FROM</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              {monthPeriods.map(p=>(<button key={p.id} style={{...BTN,flex:1,padding:"9px",fontSize:12,background:quickPid===p.id?"rgba(88,166,255,0.2)":T.surface2,color:quickPid===p.id?T.accent:T.muted,border:`1px solid ${quickPid===p.id?T.accent:T.border}`}} onClick={()=>setQuickPid(p.id)}>{p.isCurrent?"💰":"📋"} {p.label}{p.isCurrent?" ✓":""}</button>))}
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={{...BTN,flex:1,padding:"12px",background:"#238636",color:"#fff",fontSize:14}} onClick={addQuickExpense}>✅ Add — Already Paid</button>
            <button style={{...BTN,padding:"12px 16px",background:T.surface2,color:T.muted,fontSize:14}} onClick={()=>setQuickOpen(false)}>Cancel</button>
          </div>
        </div>
      </div>)}

      {moveOpen&&(<div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.72)",display:"flex",alignItems:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)setMoveOpen(false);}}>
        <div style={{width:"100%",maxWidth:500,margin:"0 auto",background:T.surface,borderRadius:"20px 20px 0 0",padding:"20px 18px 34px",border:`1px solid ${T.border}`}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>💸 Move Money</div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:T.muted,marginBottom:5}}>MOVE TO</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {Object.entries(POTS).map(([k,p])=>(<button key={k} style={{...BTN,flex:1,minWidth:90,padding:"9px",fontSize:12,background:moveTo===k?p.bg||"rgba(63,185,80,0.1)":T.surface2,color:moveTo===k?p.color:T.muted,border:`1px solid ${moveTo===k?p.color:T.border}`}} onClick={()=>setMoveTo(k)}>{p.icon} {p.label}</button>))}
            </div>
          </div>
          <div style={{marginBottom:10}}><div style={{fontSize:10,color:T.muted,marginBottom:5}}>AMOUNT ($)</div><input style={INP} type="number" inputMode="decimal" value={moveAmt} onChange={e=>setMoveAmt(e.target.value)} placeholder="0" autoFocus/></div>
          <div style={{marginBottom:14}}><div style={{fontSize:10,color:T.muted,marginBottom:5}}>NOTE (optional)</div><input style={INP} value={moveNote} onChange={e=>setMoveNote(e.target.value)} placeholder="e.g. April savings"/></div>
          <div style={{display:"flex",gap:8}}>
            <button style={{...BTN,flex:1,padding:"12px",background:"#238636",color:"#fff",fontSize:14}} onClick={doMoveMoney}>💸 Move</button>
            <button style={{...BTN,padding:"12px 16px",background:T.surface2,color:T.muted,fontSize:14}} onClick={()=>setMoveOpen(false)}>Cancel</button>
          </div>
        </div>
      </div>)}

      <div className="c">
        <div style={{marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:9,color:T.accent,letterSpacing:2,marginBottom:3,fontWeight:600}}>FINANCIAL PLANNER</div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.5}}>My Budget</div>
          </div>
          {diasProx!==null&&(<div style={{background:"rgba(63,185,80,0.08)",border:"1px solid rgba(63,185,80,0.25)",borderRadius:10,padding:"5px 10px",textAlign:"center",cursor:"pointer"}} onClick={()=>{if(currentPeriod)setTab(currentPeriod.id);}}>
            <div style={{fontSize:9,color:T.muted}}>NEXT CHECK</div>
            <div style={{fontFamily:"monospace",fontWeight:800,color:diasProx===0?"#58a6ff":"#3fb950",fontSize:diasProx===0?10:14}}>{diasProx===0?"TODAY 🎉":`${diasProx}d`}</div>
            <div style={{fontSize:9,color:T.muted}}>{nextPayday?fmd(nextPayday):""}</div>
          </div>)}

              {Object.entries(ebd).sort(([a],[b])=>+a-+b).map(([day,evts])=>(<div key={day} style={{marginBottom:8}}>
                <div style={{fontSize:10,color:T.muted,fontWeight:700,marginBottom:4}}>{mo[mth].slice(0,3)} {day}</div>
                {evts.map((ev,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,background:ev.subtipo==="cutoff"?"transparent":T.bg,border:`1px solid ${ev.subtipo==="cutoff"?T.border:T.surface2}`,marginBottom:3,opacity:ev.subtipo==="cutoff"?0.5:1}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:ev.color,flexShrink:0}}/>
                  <div style={{flex:1,fontSize:11}}>{ev.label}</div>
                  {ev.monto&&<div style={{fontFamily:"monospace",fontWeight:700,fontSize:11,color:ev.tipo==="payday"?"#3fb950":"#f85149"}}>{ev.tipo==="payday"?"+":"-"}{fmt(ev.monto)}</div>}
                </div>))}
              </div>))}
            </div>)
            :(<><div style={{fontSize:11,color:T.muted,marginBottom:12}}>Next 35 days</div>
              {Object.entries(grupos).map(([dk,g])=>{const dh=Math.ceil((g.fecha-hoy)/86400000);const isH=dh===0;return(<div key={dk} style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                  <div style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:isH?"#58a6ff":dh<=3?"#f85149":T.text}}>{dk}</div>
                  {isH&&<div style={{padding:"2px 6px",borderRadius:8,background:"rgba(88,166,255,0.2)",color:"#58a6ff",fontSize:9,fontWeight:700}}>TODAY</div>}
                  {!isH&&dh>0&&<div style={{fontSize:10,color:T.muted}}>in {dh}d</div>}
                </div>
                {g.items.map((ev,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",borderRadius:10,background:ev.subtipo==="cutoff"?"transparent":T.surface,border:`1px solid ${ev.subtipo==="cutoff"?T.border:ev.dias&&ev.dias<=3?"rgba(248,81,73,0.4)":T.border}`,marginBottom:4,opacity:ev.subtipo==="cutoff"?0.5:1}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:ev.color,flexShrink:0}}/>
                  <div style={{flex:1,fontSize:12}}>{ev.label}</div>
                  {ev.monto&&<div style={{fontFamily:"monospace",fontWeight:700,fontSize:12,color:ev.tipo==="payday"?"#3fb950":"#f85149"}}>{ev.tipo==="payday"?"+":"-"}{fmt(ev.monto)}</div>}
                </div>))}
              </div>);})}
            </>)}
          </div>);
        })()}

        {tab==="history"&&(<div className="anim">
          <div style={{background:"rgba(88,166,255,0.05)",border:"1px solid rgba(88,166,255,0.15)",borderRadius:11,padding:"11px 14px",marginBottom:12,fontSize:11,color:T.muted,lineHeight:1.6}}>
            💡 <strong style={{color:T.accent}}>Monthly Snapshot</strong> — save at end of each month.<br/>
            <strong style={{color:T.accent}}>Reset Cycle</strong> — use in each Check tab when a new paycheck arrives. Temporary &amp; quick expenses are auto-removed.
          </div>
          {(!data.snapshots||data.snapshots.length===0)?(<div style={{...CARD,padding:"34px 20px",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:8}}>📆</div><div style={{fontWeight:700,marginBottom:4}}>No history yet</div>
            <div style={{color:T.muted,fontSize:12}}>Go to Overview and save a monthly snapshot</div>
          </div>):data.snapshots.map(h=>(<div key={h.id} style={{...CARD,padding:"13px 16px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div style={{fontSize:12,color:T.muted}}>{h.fecha}</div></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
              {[{l:"Surplus",v:fmt(h.sobrante),c:n(h.sobrante)>=0?"#3fb950":"#f85149"},{l:"Total Debt",v:fmt(h.deuda),c:"#d29922"},{l:"Cash",v:fmt(h.cash||0),c:"#58a6ff"}].map(s=>(<div key={s.l} style={{background:T.bg,borderRadius:8,padding:"8px 10px"}}>
                <div style={{fontSize:9,color:T.muted,marginBottom:3}}>{s.l}</div>
                <div style={{fontFamily:"monospace",fontWeight:700,color:s.c,fontSize:13}}>{s.v}</div>
              </div>))}
            </div>
          </div>))}
        </div>)}

        {tab==="settings"&&(<div className="anim">
          <div style={{...CARD,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:11,color:T.accent,letterSpacing:1.5,fontWeight:700,marginBottom:12}}>🎨 APPEARANCE</div>
            <div style={{display:"flex",gap:8}}>
              {["dark","light"].map(th=>(<button key={th} style={{...BTN,flex:1,padding:"10px",background:theme===th?T.accent:T.surface2,color:theme===th?(th==="dark"?"#0d1117":"#fff"):T.muted,fontSize:12,border:`1px solid ${theme===th?T.accent:T.border}`}} onClick={()=>setData(p=>({...p,theme:th}))}>
                {th==="dark"?"🌙 Dark":"☀️ Light"}
              </button>))}
            </div>
          </div>
          <div style={{...CARD,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:11,color:T.accent,letterSpacing:1.5,fontWeight:700,marginBottom:12}}>💵 PAYDAY SETTINGS</div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,color:T.muted,marginBottom:5}}>DEFAULT PAYCHECK AMOUNT ($)</div>
              <input style={{...INP,fontSize:16,fontFamily:"monospace",fontWeight:700}} type="number" inputMode="decimal" value={data.checkAmount||""} onChange={e=>setData(p=>({...p,checkAmount:parseFloat(e.target.value)||0}))} placeholder="1520"/>
              <div style={{fontSize:10,color:T.muted,marginTop:5}}>Used as the default for all pay periods. You can override each period's amount individually in its own Check tab.</div>
            </div>
            <div style={{marginBottom:10}}><div style={{fontSize:9,color:T.muted,marginBottom:5}}>ANCHOR PAYDAY DATE</div><input style={{...INP,fontSize:14,padding:"9px 12px"}} type="date" value={data.proximoCobro||""} onChange={e=>setData(p=>({...p,proximoCobro:e.target.value}))}/></div>
            <div style={{marginBottom:10}}><div style={{fontSize:9,color:T.muted,marginBottom:5}}>FREQUENCY</div>
              <select style={{...INP,fontSize:14,padding:"9px 12px"}} value={data.payFreq||"biweekly"} onChange={e=>setData(p=>({...p,payFreq:e.target.value}))}>
                <option value="weekly">Weekly — every 7 days</option>
                <option value="biweekly">Biweekly — every 14 days</option>
                <option value="semimonthly">Semi-monthly — 1st &amp; 15th</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>
            <div style={{background:T.surface2,borderRadius:10,padding:"10px 12px",fontSize:11,color:T.muted,lineHeight:1.7}}>
              <div>This month: <strong style={{color:T.accent}}>{monthPeriods.length} pay period{monthPeriods.length!==1?"s":""}</strong> ({monthPeriods.map(p=>fmd(p.payday)).join(", ")})</div>
              <div>Current: <strong style={{color:T.text}}>{currentPeriod?fmd(currentPeriod.payday):"-"}</strong></div>
              <div>Next payday: <strong style={{color:"#3fb950"}}>{nextPayday?fmd(nextPayday):"-"}</strong> ({diasProx===0?"today":diasProx+"d away"})</div>
              {monthPeriods.some(p=>(data.periods[p.id]||{}).amount!=null&&n((data.periods[p.id]||{}).amount)>0&&n((data.periods[p.id]||{}).amount)!==globalCheckAmount)&&(
                <div style={{marginTop:6,paddingTop:6,borderTop:`1px solid ${T.border}`}}>
                  {monthPeriods.filter(p=>(data.periods[p.id]||{}).amount!=null&&n((data.periods[p.id]||{}).amount)>0&&n((data.periods[p.id]||{}).amount)!==globalCheckAmount).map(p=>(
                    <div key={p.id} style={{color:"#d29922"}}>✎ {p.label}: <strong>{fmt(n((data.periods[p.id]||{}).amount))}</strong> (custom)</div>
                  ))}
                </div>
              )}
            </div>
          </div>
          <div style={{...CARD,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:11,color:T.accent,letterSpacing:1.5,fontWeight:700,marginBottom:12}}>💾 DATA BACKUP</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <button style={{...BTN,flex:1,padding:"10px",background:T.surface2,color:T.muted,fontSize:12,border:`1px solid ${T.border}`}} onClick={exportData}>📥 Export</button>
              <label style={{flex:1}}><input type="file" accept=".json" onChange={importData} style={{display:"none"}}/><div style={{padding:"10px",background:T.surface2,color:T.muted,fontSize:12,border:`1px solid ${T.border}`,textAlign:"center",cursor:"pointer",borderRadius:10,fontWeight:600}}>📤 Import</div></label>
            </div>
            <div style={{fontSize:10,color:T.muted}}>Export before updating the app. Data is stored locally on this device.</div>
          </div>
          <div style={{background:"rgba(248,81,73,0.04)",border:"1px solid rgba(248,81,73,0.2)",borderRadius:14,padding:"14px 16px"}}>
            <div style={{fontSize:11,color:"#f85149",letterSpacing:1.5,fontWeight:700,marginBottom:12}}>⚠️ DANGER ZONE</div>
            <button style={{...BTN,width:"100%",padding:"11px",background:"rgba(248,81,73,0.1)",color:"#f85149",fontSize:13,border:"1px solid rgba(248,81,73,0.3)"}} onClick={()=>{if(window.confirm("Reset ALL data to defaults? Cannot be undone.")){localStorage.removeItem(SK);setData(migrate(DD));setTab("overview");toast_("🔄 App reset");}}}>🗑 Reset All Data</button>
          </div>
        </div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
