const getSnapshotReminder=(today,snapshots)=>{
  const d=today.getDate();
  const dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const prevMonthName=mo[today.getMonth()===0?11:today.getMonth()-1];
  const hasThisMonth=(snapshots||[]).some(s=>s.fecha&&s.fecha.includes(mo[today.getMonth()])&&s.fecha.includes(String(today.getFullYear())));
  const hasPrevMonth=(snapshots||[]).some(s=>{
    if(!s.fecha)return false;
    const prevY=today.getMonth()===0?today.getFullYear()-1:today.getFullYear();
    return s.fecha.includes(prevMonthName)&&s.fecha.includes(String(prevY));
  });
  if(d>=dim-2){if(!hasThisMonth)return{type:"warn",msg:"Save Monthly Snapshot before exporting backup"};else return{type:"info",msg:"Backup recommended"};}
  if(d<=3){if(!hasPrevMonth)return{type:"warn",msg:`Last month snapshot missing`};else return{type:"info",msg:"Export monthly backup recommended"};}
  return null;
};

            <div style={{color:T.muted,fontSize:12}}>Go to Overview and save a monthly snapshot</div>
          </div>):data.snapshots.map(h=>(<div key={h.id} style={{...CARD,padding:"13px 16px",marginBottom:8,cursor:"pointer",transition:"border-color 0.15s",borderColor:T.border}} onClick={()=>setSnapDetail(h)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:12,color:T.muted}}>{h.fecha}</div>
              <span style={{fontSize:10,color:T.accent,fontWeight:600}}>View →</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
              {[{l:"Surplus",v:fmt(h.sobrante),c:n(h.sobrante)>=0?"#3fb950":"#f85149"},{l:"Total Debt",v:fmt(h.deuda),c:"#d29922"}].map(s=>(<div key={s.l} style={{background:T.bg,borderRadius:8,padding:"8px 10px"}}>
                <div style={{fontSize:9,color:T.muted,marginBottom:3}}>{s.l}</div>
                <div style={{fontFamily:"monospace",fontWeight:700,color:s.c,fontSize:13}}>{s.v}</div>
              </div>))}
            </div>
          </div>))}
        </div>)}
        {tab==="settings"&&(<div className="anim">
          <div style={{...CARD,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:11,color:T.accent,letterSpacing:1.5,fontWeight:700,marginBottom:12}}>🎨 APPEARANCE</div>
            <div style={{display:"flex",gap:8}}>
              {["dark","light"].map(th=>(<button key={th} style={{...BTN,flex:1,padding:"10px",background:theme===th?T.accent:T.surface2,color:theme===th?(th==="dark"?"#0d1117":"#fff"):T.muted,fontSize:12,border:`1px solid ${theme===th?T.accent:T.border}`}} onClick={()=>setData(p=>({...p,theme:th}))}>
                {th==="dark"?"🌙 Dark":"☀️ Light"}
              </button>))}
            </div>
          </div>
          <div style={{...CARD,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:11,color:T.accent,letterSpacing:1.5,fontWeight:700,marginBottom:12}}>💵 PAYDAY SETTINGS</div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,color:T.muted,marginBottom:5}}>DEFAULT PAYCHECK AMOUNT ($)</div>
              <input style={{...INP,fontSize:16,fontFamily:"monospace",fontWeight:700}} type="number" inputMode="decimal" value={data.checkAmount||""} onChange={e=>setData(p=>({...p,checkAmount:parseFloat(e.target.value)||0}))} placeholder="1520"/>
              <div style={{fontSize:10,color:T.muted,marginTop:5}}>Used as default for all pay periods. Each paycheck can override its amount individually.</div>
            </div>
            <div style={{marginBottom:10}}><div style={{fontSize:9,color:T.muted,marginBottom:5}}>ANCHOR PAYDAY DATE</div><input style={{...INP,fontSize:14,padding:"9px 12px"}} type="date" value={data.proximoCobro||""} onChange={e=>setData(p=>({...p,proximoCobro:e.target.value}))}/></div>
            <div style={{marginBottom:10}}><div style={{fontSize:9,color:T.muted,marginBottom:5}}>FREQUENCY</div>
              <select style={{...INP,fontSize:14,padding:"9px 12px"}} value={data.payFreq||"biweekly"} onChange={e=>setData(p=>({...p,payFreq:e.target.value}))}>
                <option value="weekly">Weekly — every 7 days</option>
                <option value="biweekly">Biweekly — every 14 days</option>
                <option value="semimonthly">Semi-monthly — 1st &amp; 15th</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>
            <div style={{background:T.surface2,borderRadius:10,padding:"10px 12px",fontSize:11,color:T.muted,lineHeight:1.7}}>
              <div>This month: <strong style={{color:T.accent}}>{monthPeriods.length} pay period{monthPeriods.length!==1?"s":""}</strong> ({monthPeriods.map(p=>fmd(p.payday)).join(", ")})</div>
              <div style={{marginTop:3}}><span style={{fontWeight:600,color:T.text}}>Current</span> — <strong style={{color:T.text,fontSize:12}}>{currentPeriod?fmd(currentPeriod.payday):"-"}</strong></div>
              <div style={{marginTop:3}}><span style={{fontWeight:700,color:"#3fb950"}}>Next payday</span> — <strong style={{color:"#3fb950",fontSize:12}}>{nextPayday?fmd(nextPayday):"-"}</strong> <span style={{color:T.muted,fontSize:10}}>({diasProx===0?"today":diasProx+"d away"})</span></div>
            </div>
          </div>
          <div style={{...CARD,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:11,color:T.accent,letterSpacing:1.5,fontWeight:700,marginBottom:4}}>💾 DATA BACKUP</div>
            {snapReminder&&(<div style={{background:snapReminder.type==="warn"?"rgba(210,153,34,0.07)":"rgba(88,166,255,0.05)",border:`1px solid ${snapReminder.type==="warn"?"rgba(210,153,34,0.2)":"rgba(88,166,255,0.12)"}`,borderRadius:9,padding:"8px 11px",marginBottom:10,marginTop:8,fontSize:10,color:snapReminder.type==="warn"?"#d29922":T.muted,display:"flex",gap:6,alignItems:"center"}}>
              <span>{snapReminder.type==="warn"?"⚠️":"💡"}</span><span>{snapReminder.msg}</span>
            </div>)}
            <div style={{fontSize:10,color:T.muted,marginBottom:10,marginTop:snapReminder?0:8}}>
              Backup includes all periods, expenses, debts, pots, settings, and snapshots.<br/>
              File: <strong style={{color:T.text}}>mybudget_backup.json</strong>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <button style={{...BTN,flex:1,padding:"10px",background:T.surface2,color:T.muted,fontSize:12,border:`1px solid ${T.border}`}} onClick={exportData}>📥 Export Backup</button>
              <label style={{flex:1}}><input type="file" accept=".json" onChange={importData} style={{display:"none"}}/><div style={{padding:"10px",background:T.surface2,color:T.muted,fontSize:12,border:`1px solid ${T.border}`,textAlign:"center",cursor:"pointer",borderRadius:10,fontWeight:600}}>📤 Import Backup</div></label>
            </div>
            <div style={{fontSize:10,color:T.muted}}>Import fully replaces current data. Export first to be safe.</div>
          </div>
          <div style={{background:"rgba(248,81,73,0.04)",border:"1px solid rgba(248,81,73,0.2)",borderRadius:14,padding:"14px 16px"}}>
            <div style={{fontSize:11,color:"#f85149",letterSpacing:1.5,fontWeight:700,marginBottom:12}}>⚠️ DANGER ZONE</div>
            <button style={{...BTN,width:"100%",padding:"11px",background:"rgba(248,81,73,0.1)",color:"#f85149",fontSize:13,border:"1px solid rgba(248,81,73,0.3)"}} onClick={()=>{if(window.confirm("Reset ALL data to defaults? Cannot be undone.")){localStorage.removeItem(SK);setData(migrate(DD));setTab("overview");toast_("🔄 App reset");}}}>🗑 Reset All Data</button>
          </div>
        </div>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
