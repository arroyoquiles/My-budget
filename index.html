const getSnapshotReminder=(today,snapshots)=>{
  const d=today.getDate();
  const dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const prevMonthName=mo[today.getMonth()===0?11:today.getMonth()-1];
  const hasThisMonth=(snapshots||[]).some(s=>s.fecha&&s.fecha.includes(mo[today.getMonth()])&&s.fecha.includes(String(today.getFullYear())));
  const hasPrevMonth=(snapshots||[]).some(s=>{
    if(!s.fecha)return false;
    const prevY=today.getMonth()===0?today.getFullYear()-1:today.getFullYear();
    return s.fecha.includes(prevMonthName)&&s.fecha.includes(String(prevY));
  });
  if(d>=dim-2){if(!hasThisMonth)return{type:"warn",msg:"Save Monthly Snapshot before exporting backup"};else return{type:"info",msg:"Backup recommended"};}
  if(d<=3){if(!hasPrevMonth)return{type:"warn",msg:`Last month snapshot missing`};else return{type:"info",msg:"Export monthly backup recommended"};}
  return null;
};
// Global scroll lock manager — single source of truth
const scrollLock={
  _count:0,
  _scrollY:0,
  lock(){
    this._count++;
    if(this._count===1){
      this._scrollY=window.scrollY;
      document.body.style.overflow="hidden";
      document.body.style.position="fixed";
      document.body.style.top=-this._scrollY+"px";
      document.body.style.width="100%";
    }
  },
  unlock(){
    this._count=Math.max(0,this._count-1);
    if(this._count===0){
      const y=this._scrollY;
      document.body.style.overflow="";
      document.body.style.position="";
      document.body.style.top="";
      document.body.style.width="";
      window.scrollTo(0,y);
    }
  }
};

            <div style={{display:"flex",gap:8}}>
              <button style={{...BTN,flex:1,padding:"9px",background:T.surface2,color:T.muted,fontSize:12,border:`1px solid ${T.border}`,display:"flex",flexDirection:"column",alignItems:"center",gap:1}} onClick={exportData}><span>📥 Save Backup</span><span style={{fontSize:9,opacity:0.6}}>Download copy</span></button>
              <label style={{flex:1}}><input type="file" accept=".json" onChange={importData} style={{display:"none"}}/><div style={{padding:"9px",background:T.surface2,color:T.muted,fontSize:12,border:`1px solid ${T.border}`,textAlign:"center",cursor:"pointer",borderRadius:10,fontWeight:600,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}><span>📤 Load Backup</span><span style={{fontSize:9,opacity:0.6}}>Import file</span></div></label>
            </div>
          </div>
          {/* 5. Danger */}
          <div style={{background:"rgba(248,81,73,0.04)",border:"1px solid rgba(248,81,73,0.2)",borderRadius:14,padding:"10px 14px"}}>
            <div style={{fontSize:10,color:"#f85149",letterSpacing:1.5,fontWeight:700,marginBottom:8}}>⚠️ DANGER ZONE</div>
            <button style={{...BTN,width:"100%",padding:"10px",background:"rgba(248,81,73,0.1)",color:"#f85149",fontSize:13,border:"1px solid rgba(248,81,73,0.3)"}} onClick={()=>setResetAllConfirm(true)}>🗑 Reset All Data</button>
          </div>
        </div>)}
      </div>
    </div>
    {importPreview&&(
      <div style={{position:"fixed",inset:0,zIndex:9997,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,padding:22,width:"100%",maxWidth:340,animation:"modalEnter 0.32s cubic-bezier(0.34,1.1,0.64,1) both"}}>
          <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:4}}>📤 Restore Backup?</div>
          <div style={{fontSize:12,color:T.muted,marginBottom:14}}>This will replace ALL current data:</div>
          <div style={{background:T.surface2,borderRadius:10,padding:"10px 14px",marginBottom:16}}>
            {[["💳","Cards",importPreview.summary.cards],["🏦","Loans",importPreview.summary.loans],["📅","Periods",importPreview.summary.periods],["📸","Snapshots",importPreview.summary.snapshots],["🪣","Pots",importPreview.summary.pots]].map(([icon,label,val])=>(
              <div key={label} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                <span style={{color:T.muted}}>{icon} {label}</span>
                <span style={{color:T.text,fontWeight:700}}>{val}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={{flex:1,padding:"10px",background:"rgba(248,81,73,0.1)",color:"#f85149",fontSize:13,border:"1px solid rgba(248,81,73,0.3)",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600}} onClick={()=>setImportPreview(null)}>Cancel</button>
            <button style={{flex:1,padding:"10px",background:T.accent,color:"#fff",fontSize:13,fontWeight:700,borderRadius:10,cursor:"pointer",fontFamily:"inherit",border:"none"}}
              onClick={()=>{const{restored}=importPreview;setData(restored);try{localStorage.setItem(SK,JSON.stringify(restored));}catch(e){}setImportPreview(null);toast_("✅ Backup restored");}}>Restore</button>
          </div>
        </div>
      </div>
    )}
    {nativeConfirm&&(
      <div style={{position:"fixed",inset:0,zIndex:9996,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}
        onClick={e=>{if(e.target===e.currentTarget)setNativeConfirm(null);}}>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,padding:"20px 20px 16px",width:"100%",maxWidth:300,animation:"modalEnter 0.28s cubic-bezier(0.34,1.1,0.64,1) both"}}>
          <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:18,lineHeight:1.4,textAlign:"center"}}>{nativeConfirm.msg}</div>
          <div style={{display:"flex",gap:8}}>
            <button style={{flex:1,padding:"11px",background:T.surface2,color:T.muted,fontSize:14,border:`1px solid ${T.border}`,borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}
              onClick={()=>setNativeConfirm(null)}>Cancel</button>
            <button style={{flex:1,padding:"11px",background:"rgba(88,166,255,0.15)",color:T.accent,fontSize:14,fontWeight:700,border:`1px solid ${T.accent}44`,borderRadius:10,cursor:"pointer",fontFamily:"inherit"}}
              onClick={()=>{nativeConfirm.onOk();setNativeConfirm(null);}}>Confirm</button>
          </div>
        </div>
      </div>
    )}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
